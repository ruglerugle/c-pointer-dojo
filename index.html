<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C POINTER DOJO ― ポインタ道場 ―</title>
<!-- Google tag (gtag.js) -->

  function gtag(){dataLayer.push(arguments);}

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
html,body{max-width:100vw;overflow-x:hidden}
:root{
  --bg1:#123334;--bg2:#0c4a45;--bg3:#081c1d;
  --paper:#f6f1e2;--paper2:#fffdf6;--ink:#241d12;--muted:#8a7a5c;--line:#ddd0ad;
  --accent:#c1443a;--accent-dark:#8f2f28;
  --stack:#3f6fb0;--stack-dark:#2b4d80;
  --heap:#2fa88f;--heap-dark:#1d7a67;
  --ptr:#d98e3f;--ptr-dark:#a8661f;
  --ok:#2f9e5c;--ok-bg:#e6f5ec;--ok-bd:#8fd1ab;
  --ng:#c8433f;--ng-bg:#fbe9e8;--ng-bd:#e79a97;
  --shadow:0 16px 40px rgba(0,0,0,.35);
  --r:10px;--f:system-ui,-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;
  --m:ui-monospace,'Cascadia Code','SFMono-Regular',Consolas,monospace;
}
body{font-family:var(--f);color:var(--ink);font-weight:600;min-height:100vh;
  background:radial-gradient(circle at 20% 0%,var(--bg2) 0,var(--bg1) 40%,var(--bg3) 100%);}
.app-shell{min-height:100vh;display:flex;flex-direction:column;gap:12px;padding:10px 12px 24px;}

/* Header */
.game-header{display:flex;align-items:center;gap:18px;flex-wrap:wrap;color:#fff;padding:10px 16px;
  background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(0,0,0,.14));border-radius:12px;border:1px solid rgba(255,255,255,.15)}
.brand{display:flex;flex-direction:column;gap:2px;min-width:220px}
.brand-title{font-size:22px;font-weight:950;letter-spacing:.02em;color:#e8a53f;text-shadow:0 2px 0 rgba(0,0,0,.4)}
.brand-sub{font-size:12.5px;font-weight:800;color:#d9ece7}
.head-progress-wrap{flex:1;min-width:160px;display:flex;flex-direction:column;gap:4px}
.head-progress-label{font-size:11.5px;color:#cfe4de;font-weight:800}
.head-progress{height:14px;background:rgba(255,255,255,.18);border-radius:999px;overflow:hidden;box-shadow:inset 0 2px 4px rgba(0,0,0,.3)}
.head-progress-fill{height:100%;width:0;background:linear-gradient(90deg,#f3c47a,var(--ptr));border-radius:999px;transition:width .4s}
.head-reset{padding:9px 14px;border:1.5px solid rgba(255,255,255,.55);border-radius:8px;background:rgba(0,0,0,.2);color:#fff;font-size:12.5px;font-weight:800;cursor:pointer;white-space:nowrap}
.head-reset:hover{background:rgba(255,255,255,.12)}

/* Layout */
.game-layout{display:grid;grid-template-columns:230px minmax(0,1fr);gap:14px;align-items:start}
@media(max-width:820px){.game-layout{grid-template-columns:1fr}}

/* Sidebar */
.side-panel{background:linear-gradient(180deg,rgba(12,74,69,.92),rgba(8,28,29,.95));border:1px solid rgba(255,255,255,.16);
  border-radius:12px;box-shadow:var(--shadow);overflow:hidden;position:sticky;top:10px}
@media(max-width:820px){.side-panel{position:static;overflow-x:auto}}
.side-head{padding:12px 14px;font-size:13px;font-weight:900;color:#eaf6f2;border-bottom:1px solid rgba(255,255,255,.14)}
.side-list{display:flex;flex-direction:column}
@media(max-width:820px){.side-list{flex-direction:row}}
.side-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid rgba(255,255,255,.09);
  color:#c8ded7;cursor:pointer;user-select:none;touch-action:manipulation;min-width:0}
@media(max-width:820px){.side-item{border-bottom:none;border-right:1px solid rgba(255,255,255,.09);flex:0 0 auto;min-width:160px}}
.side-item:hover{background:rgba(255,255,255,.06)}
.side-item.active{background:rgba(217,142,63,.2);box-shadow:inset 3px 0 0 var(--ptr)}
.side-item.locked{opacity:.45;cursor:not-allowed}
.side-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.side-text{min-width:0}
.side-main{font-size:12.5px;font-weight:900;line-height:1.3;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.side-sub{font-size:10.5px;color:#a9c7be;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Main area */
.main-area{background:var(--paper);border:1px solid #e3d8bd;border-radius:12px;padding:18px 18px 20px;box-shadow:var(--shadow);min-height:520px}
.chapter-head{margin-bottom:12px}
.chapter-badge{display:inline-block;background:linear-gradient(#e8a53f,var(--ptr-dark));color:#3a2705;border-radius:7px;
  padding:4px 11px;font-size:12px;font-weight:950;letter-spacing:.02em;margin-right:8px;box-shadow:0 2px 0 rgba(0,0,0,.15)}
.chapter-title{display:inline;font-size:20px;font-weight:950;color:#1c2f2b}
.chapter-sub{font-size:13px;color:var(--muted);margin-top:4px;font-weight:700}

/* Dialogue */
.dialogue-scene{display:flex;flex-direction:column;gap:8px;margin:14px 0 16px}
.d-row{display:grid;grid-template-columns:64px minmax(0,1fr);gap:12px;align-items:center;
  background:linear-gradient(180deg,#fff,var(--paper2));border:1px solid var(--line);border-radius:10px;padding:9px 12px}
.d-row.right{grid-template-columns:minmax(0,1fr) 64px}
.d-row.right .d-avatar{order:2}
.d-row.right .d-bubble{order:1}
.d-avatar{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;
  box-shadow:0 3px 6px rgba(0,0,0,.18);flex-shrink:0}
.d-avatar.shihan{background:linear-gradient(#fde3d6,#f7c2a4)}
.d-avatar.deshi{background:linear-gradient(#dcefe9,#b9dcd0)}
.d-bubble{font-size:13.5px;line-height:1.75;color:#251c3c;font-weight:700}
.d-name{font-size:10.5px;font-weight:900;color:var(--muted);margin-bottom:2px}

/* Mission box */
.mission-box{background:linear-gradient(180deg,#fff8e6,#fdefc9);border:1px solid #e3c877;border-radius:10px;padding:12px 14px;margin-bottom:14px}
.mission-label{font-size:11.5px;font-weight:950;color:#8a6614;margin-bottom:3px}
.mission-text{font-size:13.5px;color:#3a2c08;font-weight:700;line-height:1.6}
.mission-status{display:inline-block;margin-top:8px;padding:3px 11px;border-radius:999px;font-size:11.5px;font-weight:900;
  background:#eee1bd;color:#8a6614}
.mission-status.ok{background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok-bd)}

/* Stage nav */
.stage-nav{display:flex;justify-content:flex-end;gap:10px;margin-top:18px;flex-wrap:wrap}
.btn{border:1px solid #c9bda0;background:#fff;border-radius:8px;padding:.65rem 1.2rem;font-size:13.5px;cursor:pointer;
  color:var(--ink);font-family:var(--f);font-weight:800;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.btn:hover{background:#f4efe0}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:linear-gradient(#d98e3f,#a8661f);border-color:#8f5518;color:#fff;box-shadow:0 3px 0 #6f430f}
.btn-primary:hover{opacity:.92;background:linear-gradient(#d98e3f,#a8661f)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;box-shadow:none}

/* Generic choice buttons */
.choice-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.choice-btn{border:1.5px solid #b6c9c2;background:#fff;border-radius:8px;padding:.55rem 1rem;font-size:13px;font-weight:800;
  cursor:pointer;color:#20463d;touch-action:manipulation;text-align:left}
.choice-btn:hover{background:#eef7f3}
.choice-btn.choice-ok{background:var(--ok-bg);border-color:var(--ok-bd);color:var(--ok)}
.choice-btn.choice-ng{background:var(--ng-bg);border-color:var(--ng-bd);color:var(--ng)}
.quiz-q{font-size:13.5px;font-weight:850;color:#1c2f2b;margin-top:4px}
.quiz-head{font-size:14px;font-weight:950;color:#1c2f2b;margin:18px 0 10px;padding-top:10px;border-top:1px dashed var(--line)}
.quiz-card{background:linear-gradient(180deg,#fff,var(--paper2));border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:10px}
.quiz-explain{margin-top:9px;font-size:12.5px;line-height:1.6;color:#3a2c08;background:#fff8e6;border:1px solid #e3c877;border-radius:8px;padding:8px 10px}

/* ===== Code stepper ===== */
.stepper{display:flex;flex-direction:column;gap:12px}
.panel-head{font-size:12px;font-weight:900;color:var(--muted);margin-bottom:6px}
.code-panel{background:#0e1613;border-radius:10px;padding:12px 4px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.06)}
.code-panel .panel-head{color:#9fd6c6;padding:0 12px;margin-bottom:8px}
.code-block{font-family:var(--m);font-size:12.5px;line-height:1.85;overflow-x:auto}
.code-line{display:flex;gap:10px;padding:1px 12px;white-space:pre;color:#cfe9de;border-left:3px solid transparent}
.code-line.active{background:rgba(217,142,63,.18);border-left-color:var(--ptr);color:#fff}
.ln-no{color:#5c8a7c;min-width:22px;text-align:right;user-select:none;flex-shrink:0}
.ln-text{white-space:pre}
.tk-kw{color:#e8a53f;font-weight:800}
.tk-fn{color:#7fd6c4}
.tk-str{color:#f0c987}
.tk-num{color:#9fd6c6}
.tk-cm{color:#5c8a7c;font-style:italic}

.mem-panel-wrap{position:relative;display:grid;grid-template-columns:1fr 1fr;gap:14px;background:#fbf7ea;border:1px solid var(--line);border-radius:10px;padding:12px}
@media(max-width:640px){.mem-panel-wrap{grid-template-columns:1fr}}
.mem-col-head{font-size:12px;font-weight:900;color:var(--muted);margin-bottom:8px}
.mem-col-body{display:flex;flex-direction:column;gap:10px;min-height:40px}
.arrow-svg{position:absolute;inset:0;pointer-events:none;overflow:visible}
.arrow-path{fill:none;stroke:var(--ptr);stroke-width:2}
.arrow-path.dangling{stroke:var(--ng);stroke-dasharray:4 3}

.frame-box{border:1.5px solid var(--stack);border-radius:8px;overflow:hidden;background:#fff}
.frame-head{background:linear-gradient(#5f8bcc,var(--stack-dark));color:#fff;font-size:11.5px;font-weight:900;padding:5px 10px}
.frame-vars{display:flex;flex-direction:column;gap:6px;padding:8px}
.frame-empty{font-size:11.5px;color:var(--muted);padding:2px 2px}

.mem-box{border:1.5px solid var(--stack);border-radius:7px;background:#fff;font-size:12px}
.mem-box.heap-box{border-color:var(--heap)}
.mem-box.heap-box.is-freed{opacity:.55;border-style:dashed;filter:grayscale(.25)}
.mem-box-row{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:5px 8px;background:rgba(63,111,176,.08)}
.heap-box .mem-box-row{background:rgba(47,168,143,.1)}
.mem-box-name{font-family:var(--m);font-size:11.5px}
.mem-box-label{font-family:var(--m);font-size:11.5px;font-weight:800}
.mem-addr{font-family:var(--m);font-size:10px;color:var(--muted)}
.mem-box-body{padding:6px 8px}
.mem-box-fields{padding:2px 0}
.mem-field-row{display:flex;justify-content:space-between;gap:8px;padding:3px 8px;font-family:var(--m);font-size:11.5px;border-top:1px dashed var(--line)}
.mem-field-row:first-child{border-top:none}
.mem-box-badge{font-size:10.5px;font-weight:900;color:var(--ng);padding:3px 8px;background:var(--ng-bg);text-align:center}

.tag-null{display:inline-block;font-family:var(--m);font-size:10.5px;font-weight:800;color:#7a7050;background:#eee6cf;border-radius:5px;padding:1px 6px}
.tag-wild{display:inline-block;font-family:var(--m);font-size:10.5px;font-weight:800;color:var(--ng);background:var(--ng-bg);border-radius:5px;padding:1px 6px}
.tag-addr{display:inline-block;font-family:var(--m);font-size:10.5px;font-weight:800;color:var(--ptr-dark);background:#fdeed4;border-radius:5px;padding:1px 6px}

.step-note{font-size:13px;line-height:1.7;color:#241d12;background:#fff;border:1px solid var(--line);border-radius:8px;padding:10px 12px}
.step-controls{display:flex;align-items:center;justify-content:center;gap:14px}
.step-progress{font-family:var(--m);font-size:12px;color:var(--muted);min-width:56px;text-align:center}

/* Code quiz cards (bug dojo / final challenge) */
.codequiz-card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:14px}
.codequiz-code{font-family:var(--m);font-size:12px;line-height:1.75;background:#0e1613;color:#cfe9de;border-radius:8px;padding:10px 12px;margin-bottom:10px;overflow-x:auto;white-space:pre}
.codequiz-code .code-line{padding:0;border-left:none}

/* Ending */
.ending{text-align:center;padding:20px 10px}
.ending h2{font-size:22px;margin-bottom:14px;color:#1c2f2b}
.ending p{font-size:13.5px;line-height:1.8;color:#3a2c08;margin-bottom:16px}
.ending-list{text-align:left;display:inline-block;background:#fff8e6;border:1px solid #e3c877;border-radius:10px;padding:14px 18px;font-size:12.5px;line-height:2;color:#3a2c08;margin-bottom:18px}
</style>
</head>
<body>
<div class="app-shell">
  <header class="game-header">
    <div class="brand">
      <div class="brand-title">🥋 C POINTER DOJO</div>
      <div class="brand-sub">― ポインタ道場 ―</div>
    </div>
    <div class="head-progress-wrap">
      <div class="head-progress-label" id="progress-label">クリア 0 / 8</div>
      <div class="head-progress"><div class="head-progress-fill" id="progress-fill"></div></div>
    </div>
    <button class="head-reset" id="btn-reset-all">🔄 最初から</button>
  </header>

  <div class="game-layout">
    <aside class="side-panel">
      <div class="side-head">📚 章の一覧</div>
      <div class="side-list" id="side-list"></div>
    </aside>
    <main class="main-area" id="main-area"></main>
  </div>
</div>

<script>
'use strict';

/* =====================================================================
   utilities
   ===================================================================== */
function qs(sel, root){ return (root||document).querySelector(sel); }
function escapeHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function highlightC(line){
  const escd = escapeHtml(line);
  return escd.replace(
    /(\/\/.*$)|("(?:[^"\\]|\\.)*")|\b(int|char|double|float|void|struct|typedef|return|if|else|while|for|sizeof|NULL)\b|\b(malloc|free|printf)\b|\b(\d+(?:\.\d+)?)\b/g,
    (m, cm, str, kw, fn, num) => {
      if(cm) return `<span class="tk-cm">${cm}</span>`;
      if(str) return `<span class="tk-str">${str}</span>`;
      if(kw) return `<span class="tk-kw">${kw}</span>`;
      if(fn) return `<span class="tk-fn">${fn}</span>`;
      if(num) return `<span class="tk-num">${num}</span>`;
      return m;
    }
  );
}

/* =====================================================================
   memory-state model shared by every stepper stage
   ===================================================================== */
function makeStackAddrGen(){
  let cur = 0x7ffee260;
  return (size)=>{ cur -= (size||4); return cur; };
}
function makeHeapAddrGen(){
  let cur = 0x55d5a010;
  return (size)=>{ const a = cur; cur += (Math.ceil((size||4)/16)*16 || 16); return a; };
}
function freshMem(frameNames){
  const mem = { frames:[], heap:[], _stackAddr:makeStackAddrGen(), _heapAddr:makeHeapAddrGen() };
  (frameNames||['main']).forEach(n=> mem.frames.push({id:n, name:n, vars:[]}));
  return mem;
}
function sizeOfType(type){
  if(type.includes('*')) return 8;
  if(type==='double') return 8;
  return 4;
}
function svar(mem, frameId, id, name, type, value, pointsTo){
  const addrNum = mem._stackAddr(sizeOfType(type));
  const frame = mem.frames.find(f=>f.id===frameId);
  const v = {id, name, type, value, addr:'0x'+addrNum.toString(16)};
  if(pointsTo !== undefined) v.pointsTo = pointsTo;
  frame.vars.push(v);
}
function stackArrayAddrs(mem, n, elemSize){
  const start = mem._stackAddr(n*elemSize);
  return Array.from({length:n}, (_,i)=> start + i*elemSize);
}
function svarWithAddr(mem, frameId, id, name, type, value, addrNum){
  const frame = mem.frames.find(f=>f.id===frameId);
  frame.vars.push({id, name, type, value, addr:'0x'+addrNum.toString(16)});
}
function hblock(mem, id, label, size, opts){
  opts = opts || {};
  const addrNum = mem._heapAddr(size);
  mem.heap.push({id, label, size, addr:'0x'+addrNum.toString(16), status:'alive', fields:opts.fields||null, value:opts.value});
}
function hfree(mem, id){ const h = mem.heap.find(x=>x.id===id); if(h) h.status='freed'; }
function setHeapValue(mem, id, value){ const h = mem.heap.find(x=>x.id===id); if(h) h.value = value; }
function setVar(mem, frameId, varId, patch){
  const f = mem.frames.find(x=>x.id===frameId); if(!f) return;
  const v = f.vars.find(x=>x.id===varId); if(v) Object.assign(v, patch);
}
function setField(mem, heapId, key, patch){
  const h = mem.heap.find(x=>x.id===heapId); if(!h || !h.fields) return;
  const fld = h.fields.find(x=>x.key===key); if(fld) Object.assign(fld, patch);
}
function pushFrame(mem, id, name){ mem.frames.push({id, name, vars:[]}); }
function popFrame(mem, id){ mem.frames = mem.frames.filter(f=>f.id!==id); }

function resolveAddrDisplay(mem, pointsTo){
  const h = mem.heap.find(x=>x.id===pointsTo);
  if(h) return h.addr;
  for(const f of mem.frames){ const v = f.vars.find(x=>x.id===pointsTo); if(v) return v.addr; }
  return null;
}
function isFreedTarget(mem, id){
  const h = mem.heap.find(x=>x.id===id);
  return h ? h.status==='freed' : false;
}
function collectPointerAnchors(mem){
  const list = [];
  mem.frames.forEach(f=> f.vars.forEach(v=>{
    if(v.pointsTo && v.pointsTo!=='NULL' && v.pointsTo!=='WILD'){
      list.push({fromDomId:`box-${v.id}`, toId:v.pointsTo, dangling:isFreedTarget(mem, v.pointsTo)});
    }
  }));
  mem.heap.forEach(h=>{
    (h.fields||[]).forEach(fld=>{
      if(fld.pointsTo && fld.pointsTo!=='NULL' && fld.pointsTo!=='WILD'){
        list.push({fromDomId:`field-${h.id}-${fld.key}`, toId:fld.pointsTo, dangling:isFreedTarget(mem, fld.pointsTo)});
      }
    });
  });
  return list;
}

/* =====================================================================
   memory-panel rendering
   ===================================================================== */
function renderVarBox(v, mem){
  const isPtr = Object.prototype.hasOwnProperty.call(v, 'pointsTo');
  let valueHtml;
  if(!isPtr){ valueHtml = escapeHtml(String(v.value)); }
  else if(v.pointsTo === 'NULL'){ valueHtml = `<span class="tag-null">NULL</span>`; }
  else if(v.pointsTo === 'WILD'){ valueHtml = `<span class="tag-wild">❓ 未初期化</span>`; }
  else { valueHtml = `<span class="tag-addr">${resolveAddrDisplay(mem, v.pointsTo) || '?'}</span>`; }
  return `<div class="mem-box stack-box" id="box-${v.id}">
    <div class="mem-box-row"><span class="mem-box-name">${escapeHtml(v.type)} <b>${escapeHtml(v.name)}</b></span><span class="mem-addr">${v.addr}</span></div>
    <div class="mem-box-body">${valueHtml}</div>
  </div>`;
}
function renderFrames(mem){
  return mem.frames.slice().reverse().map(f=>`
    <div class="frame-box">
      <div class="frame-head">🔧 ${escapeHtml(f.name)}()</div>
      <div class="frame-vars">${f.vars.length ? f.vars.map(v=>renderVarBox(v, mem)).join('') : '<div class="frame-empty">（変数なし）</div>'}</div>
    </div>`).join('');
}
function renderHeapBox(h, mem){
  const freed = h.status === 'freed';
  let body;
  if(h.fields){
    body = h.fields.map(f=>{
      const isPtr = Object.prototype.hasOwnProperty.call(f, 'pointsTo');
      let vhtml;
      if(!isPtr) vhtml = escapeHtml(String(f.value));
      else if(f.pointsTo === 'NULL') vhtml = `<span class="tag-null">NULL</span>`;
      else if(f.pointsTo === 'WILD') vhtml = `<span class="tag-wild">❓</span>`;
      else vhtml = `<span class="tag-addr">${resolveAddrDisplay(mem, f.pointsTo) || '?'}</span>`;
      return `<div class="mem-field-row" id="field-${h.id}-${f.key}"><span class="mem-field-name">${escapeHtml(f.name)}</span><span class="mem-field-value">${vhtml}</span></div>`;
    }).join('');
  } else {
    body = `<div class="mem-field-row"><span class="mem-field-name">value</span><span class="mem-field-value">${escapeHtml(String(h.value))}</span></div>`;
  }
  return `<div class="mem-box heap-box ${freed ? 'is-freed' : ''}" id="box-${h.id}">
    <div class="mem-box-row"><span class="mem-box-label">${escapeHtml(h.label)}</span><span class="mem-addr">${h.addr}</span></div>
    <div class="mem-box-fields">${body}</div>
    ${freed ? '<div class="mem-box-badge">🗑 解放済み（use-after-freeに注意）</div>' : ''}
  </div>`;
}
function renderHeap(mem){
  if(!mem.heap.length) return '<div class="frame-empty">（まだ確保されていません）</div>';
  return mem.heap.map(h=> renderHeapBox(h, mem)).join('');
}
function drawArrows(root, mem){
  const wrap = qs('#mem-panel-wrap', root);
  const svg = qs('#arrow-svg', root);
  if(!wrap || !svg) return;
  const wrapRect = wrap.getBoundingClientRect();
  svg.setAttribute('width', wrapRect.width);
  svg.setAttribute('height', wrapRect.height);
  svg.innerHTML = `<defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="${getComputedStyle(document.documentElement).getPropertyValue('--ptr').trim() || '#d98e3f'}"/>
    </marker>
    <marker id="arrowhead-ng" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="${getComputedStyle(document.documentElement).getPropertyValue('--ng').trim() || '#c8433f'}"/>
    </marker>
  </defs>`;
  collectPointerAnchors(mem).forEach(a=>{
    const fromEl = qs('#'+CSS.escape(a.fromDomId), root);
    const toEl = qs('#'+CSS.escape('box-'+a.toId), root);
    if(!fromEl || !toEl) return;
    const fr = fromEl.getBoundingClientRect(), tr = toEl.getBoundingClientRect();
    const x1 = fr.right - wrapRect.left, y1 = fr.top + fr.height/2 - wrapRect.top;
    const x2 = tr.left - wrapRect.left, y2 = tr.top + tr.height/2 - wrapRect.top;
    const mx = (x1+x2)/2;
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', `M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`);
    path.setAttribute('class', 'arrow-path' + (a.dangling ? ' dangling' : ''));
    path.setAttribute('marker-end', a.dangling ? 'url(#arrowhead-ng)' : 'url(#arrowhead)');
    svg.appendChild(path);
  });
}
window._currentArrowRedraw = null;
window.addEventListener('resize', ()=>{ if(window._currentArrowRedraw) window._currentArrowRedraw(); });

/* =====================================================================
   generic quiz block (used at the end of a stepper)
   ===================================================================== */
function renderQuizArea(container, quizzes, onDone){
  container.innerHTML = quizzes.map((q,qi)=>`
    <div class="quiz-card" data-qi="${qi}">
      <div class="quiz-q">Q${qi+1}. ${q.q}</div>
      <div class="choice-list">${q.choices.map((c,ci)=>`<button class="choice-btn" data-qi="${qi}" data-ci="${ci}">${escapeHtml(c)}</button>`).join('')}</div>
      <div class="quiz-explain" style="display:none"></div>
    </div>`).join('');
  const solved = new Set();
  container.querySelectorAll('.choice-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const qi = Number(btn.dataset.qi), ci = Number(btn.dataset.ci);
      const card = container.querySelector(`.quiz-card[data-qi="${qi}"]`);
      if(card.classList.contains('answered')) return;
      const q = quizzes[qi];
      const isOk = ci === q.correct;
      card.querySelectorAll('.choice-btn').forEach((b,i)=>{
        if(i===q.correct) b.classList.add('choice-ok');
        else if(i===ci && !isOk) b.classList.add('choice-ng');
      });
      card.classList.add('answered');
      const ex = card.querySelector('.quiz-explain');
      ex.style.display = 'block';
      ex.innerHTML = (isOk ? '✅ 正解。 ' : '❌ 不正解。 ') + q.explain;
      if(isOk){ solved.add(qi); if(solved.size === quizzes.length) onDone(); }
    });
  });
}

/* =====================================================================
   generic code stepper
   ===================================================================== */
function buildStepper(root, ctx, cfg){
  root.innerHTML = `
    <div class="stepper">
      <div class="code-panel">
        <div class="panel-head">📝 実行するCコード</div>
        <div class="code-block" id="code-block"></div>
      </div>
      <div class="mem-panel-wrap" id="mem-panel-wrap">
        <div class="mem-col"><div class="mem-col-head">📥 スタック</div><div class="mem-col-body" id="frames-body"></div></div>
        <div class="mem-col"><div class="mem-col-head">📤 ヒープ</div><div class="mem-col-body" id="heap-body"></div></div>
        <svg class="arrow-svg" id="arrow-svg"></svg>
      </div>
      <div class="step-note" id="step-note"></div>
      <div class="step-controls">
        <button class="btn" id="btn-prev">◀ 前へ</button>
        <span class="step-progress" id="step-progress"></span>
        <button class="btn btn-primary" id="btn-next">次へ ▶</button>
      </div>
      <div class="quiz-area" id="quiz-area"></div>
    </div>
  `;
  let stepIdx = -1;
  let quizMounted = false;

  function computeMem(){
    const mem = cfg.initMem();
    for(let i=0;i<=stepIdx;i++) cfg.steps[i].apply(mem);
    return mem;
  }

  function render(){
    const mem = computeMem();
    const curLine = stepIdx>=0 ? cfg.steps[stepIdx].line : null;
    qs('#code-block', root).innerHTML = cfg.code.map((text,i)=>{
      const ln = i+1;
      return `<div class="code-line ${ln===curLine?'active':''}"><span class="ln-no">${ln}</span><span class="ln-text">${highlightC(text)}</span></div>`;
    }).join('');
    qs('#frames-body', root).innerHTML = renderFrames(mem);
    qs('#heap-body', root).innerHTML = renderHeap(mem);
    drawArrows(root, mem);
    qs('#step-note', root).innerHTML = stepIdx < 0 ? '▶ 「次へ」を押してコードの実行を始めよう。' : cfg.steps[stepIdx].note;
    qs('#step-progress', root).textContent = `${stepIdx+1} / ${cfg.steps.length}`;
    qs('#btn-prev', root).disabled = stepIdx < 0;
    qs('#btn-next', root).disabled = stepIdx >= cfg.steps.length - 1;
    if(stepIdx >= cfg.steps.length - 1 && !quizMounted){
      quizMounted = true;
      const area = qs('#quiz-area', root);
      area.innerHTML = '<div class="quiz-head">🧠 理解度チェック</div><div id="quiz-cards"></div>';
      renderQuizArea(qs('#quiz-cards', root), cfg.quiz, ()=> ctx.complete());
    }
  }

  qs('#btn-prev', root).addEventListener('click', ()=>{ if(stepIdx>=0){ stepIdx--; render(); } });
  qs('#btn-next', root).addEventListener('click', ()=>{ if(stepIdx<cfg.steps.length-1){ stepIdx++; render(); } });
  window._currentArrowRedraw = ()=> drawArrows(root, computeMem());
  render();
}

      '}',

    steps:[
      {line:4, apply:(m)=>svar(m,'main','s_a','a','int',10), note:'変数 <b>a</b> がスタックに置かれ、値10が格納された。右側に自動で割り振られた番地(アドレス)が表示されている。'},
      {line:5, apply:(m)=>svar(m,'main','s_b','b','int',20), note:'続けて変数 <b>b</b> が積まれた。スタックは呼ばれた順に積み上がっていく。'},
      {line:6, apply:(m)=>{}, note:'<code>&a</code> は「aが置かれている番地」を取り出す演算子じゃ。出力例: <code>0x7ffee25c</code>（上のスタック図でaの番地として表示されている値と同じじゃ）'},

      {line:8, apply:(m)=>{}, note:'<code>return 0;</code> でmainの終了処理に入る。'},
      {line:9, apply:(m)=>popFrame(m,'main'), note:'mainが終了。スタックフレームがまとめて破棄され、a・bのメモリは自動的に返却される。ヒープと違い、スタックの解放はコンパイラが自動でやってくれる。'},
    ],
    quiz:[
      {q:'&a という式で得られるものは？', choices:['aのコピーされた値','aが置かれているメモリの番地','aのデータ型'], correct:1, explain:'&は「アドレス演算子」。変数そのものではなく、その変数が置かれている番地を取り出す。'},
      {q:'mainが終了(return)すると、a・bのメモリはどうなる？', choices:['自動的に解放される(スタックが巻き戻る)','ずっと残り続けるのでfree()が必要','ガベージコレクタが後で回収する'], correct:0, explain:'スタック上のローカル変数はヒープと違いfree()不要。関数終了時にコンパイラが自動で解放(巻き戻し)する。'},

      {q:'free(p); の直後に p = NULL; とする主な理由は？', choices:['ダングリングポインタの誤用（use-after-free）を防ぐため','ヒープの空き容量を増やすため','コンパイルエラーを防ぐため'], correct:0, explain:'NULLにしておけば、その後うっかり*pへアクセスしてもすぐ気づける（多くの環境でクラッシュする）。解放済みメモリを黙って読み書きし続ける事故を防げる。'},

/* ---------- shared state / persistence ---------- */
const STORE_KEY = 'cPointerDojoProgress';
const state = { unlocked:1, cleared:new Set(), currentIndex:0 };

function loadProgress(){
  try{
    const raw = JSON.parse(localStorage.getItem(STORE_KEY) || 'null');
    if(raw){
      state.unlocked = raw.unlocked || 1;
      state.cleared = new Set(raw.cleared || []);
    }
  }catch(e){}
  if (new URLSearchParams(location.search).has('all')) state.unlocked = STAGES.length;
}
function saveProgress(){
  localStorage.setItem(STORE_KEY, JSON.stringify({unlocked:state.unlocked, cleared:[...state.cleared]}));
}

/* ---------- dialogue renderer ---------- */
function renderDialogue(lines){
  return lines.map(l=>{
    const isDeshi = l.who === 'deshi';
    return `<div class="d-row ${isDeshi?'right':''}">
      <div class="d-avatar ${l.who}">${l.who==='shihan' ? '🥋' : '🧑‍🎓'}</div>
      <div class="d-bubble">
        <div class="d-name">${l.who==='shihan' ? '師範' : 'ミナト（弟子）'}</div>
        ${l.text}
      </div>
    </div>`;
  }).join('');
}

/* ---------- sidebar / header ---------- */
function renderSidebar(){
  const list = qs('#side-list');
  list.innerHTML = STAGES.map((s,i)=>{
    const locked = i > state.unlocked - 1;
    const cleared = state.cleared.has(i);
    const active = i === state.currentIndex;
    const icon = cleared ? '✅' : locked ? '🔒' : '📖';
    return `<div class="side-item ${active?'active':''} ${locked?'locked':''}" data-index="${i}">
      <span class="side-icon">${icon}</span>
      <span class="side-text">
        <div class="side-main">第${i+1}章 ${s.title}</div>
        <div class="side-sub">${s.sub}</div>
      </span>
    </div>`;
  }).join('');
  list.querySelectorAll('.side-item').forEach(item=>{
    item.addEventListener('click', ()=>{
      const i = Number(item.dataset.index);
      if(i > state.unlocked - 1) return;
      mountStage(i);
    });
  });

  qs('#progress-label').textContent = `クリア ${state.cleared.size} / ${STAGES.length}`;
  qs('#progress-fill').style.width = (state.cleared.size / STAGES.length * 100) + '%';
}

qs('#btn-reset-all').addEventListener('click', ()=>{
  if(!confirm('進行状況をすべてリセットして最初からやり直しますか？')) return;
  state.unlocked = 1; state.cleared = new Set();
  saveProgress();
  mountStage(0);
});

/* ---------- stage mount / navigation ---------- */
function mountStage(index){
  state.currentIndex = index;
  const meta = STAGES[index];
  const main = qs('#main-area');
  main.innerHTML = `
    <div class="chapter-head">
      <span class="chapter-badge">第${index+1}章</span><span class="chapter-title">${meta.title}</span>
      <div class="chapter-sub">${meta.sub}</div>
    </div>
    <div class="dialogue-scene">${renderDialogue(meta.dialogue)}</div>
    <div class="mission-box">
      <div class="mission-label">🎯 お題</div>
      <div class="mission-text">${meta.missionText}</div>
      <div class="mission-status" id="mission-status">${state.cleared.has(index) ? '達成！' : '未達成'}</div>
    </div>
    <div class="stage-play" id="stage-play"></div>
    <div class="stage-nav">
      <button class="btn" id="btn-retry">↺ このステージをやり直す</button>
      <button class="btn btn-primary" id="btn-next" ${state.cleared.has(index) ? '' : 'disabled'}>
        ${index === STAGES.length-1 ? 'クリア画面へ ▶' : 'つぎのステージへ ▶'}
      </button>
    </div>
  `;
  if(state.cleared.has(index)) qs('#mission-status').classList.add('ok');

  qs('#btn-retry').addEventListener('click', ()=> mountStage(index));
  qs('#btn-next').addEventListener('click', ()=>{
    if(index === STAGES.length-1) showEnding();
    else mountStage(index+1);
  });

  const ctx = {
    complete(){
      if(state.cleared.has(index)) return;
      state.cleared.add(index);
      state.unlocked = Math.max(state.unlocked, index+2);
      saveProgress();
      const statusEl = qs('#mission-status');
      statusEl.textContent = '達成！';
      statusEl.classList.add('ok');
      qs('#btn-next').removeAttribute('disabled');
      renderSidebar();
    },
  };
  meta.build(qs('#stage-play'), ctx);
  renderSidebar();
  window.scrollTo({top:0, behavior:'smooth'});
}

function showEnding(){
  const main = qs('#main-area');
  main.innerHTML = `
    <div class="ending">
      <h2>🥋 C POINTER DOJO・皆伝！</h2>
      <p>変数とアドレス・ポインタ演算・malloc/free・構造体とポインタ・二重ポインタ・連結リスト・典型的なバグ・総合チャレンジ。<br>ポインタ道場の全課程を修めたね。</p>
      <div class="ending-list">
        ✅ &演算子 = 変数が置かれている番地を取り出す<br>
        ✅ ポインタ演算 = 指す型のサイズ単位で進む<br>
        ✅ malloc/free = ヒープの確保と解放は手動で対にする<br>
        ✅ ダングリングポインタ = 解放後も古い番地を指したままの状態<br>
        ✅ pl->id = (*pl).id の糖衣構文<br>
        ✅ int** = 関数の中で呼び出し元のポインタ自体を書き換える手段<br>
        ✅ 連結リスト = ヒープ上のノードをポインタで鎖につなぐ構造<br>
        ✅ 典型的なバグ = use-after-free・double free・メモリリーク・バッファオーバーフロー
      </div>
      <button class="btn btn-primary" id="btn-replay">↺ はじめから修行しなおす</button>
    </div>
  `;
  qs('#btn-replay').addEventListener('click', ()=>{
    state.unlocked = 1; state.cleared = new Set();
    saveProgress();
    mountStage(0);
  });
  state.currentIndex = -1;
  renderSidebar();
}

/* ---------- boot ---------- */
loadProgress();
mountStage(Math.min(state.currentIndex, state.unlocked-1));
</script>
</body>
</html>
